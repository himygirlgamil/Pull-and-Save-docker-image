name: x86-64 Pull and Save Docker Image
on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称 多个用英文逗号分开'
        required: true
        default: 'alpine:latest,busybox:stable-glibc'
      artifact_name:
        description: '请填写制品包名称'
        required: true
        default: 'artifact'

jobs:
  # ==========================================
  # 阶段一：下载、打包、分片，并生成动态文件列表
  # ==========================================
  pull_and_package:
    runs-on: ubuntu-22.04
    outputs:
      files_json: ${{ steps.set-matrix.outputs.files_json }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clean up Docker to free space
      run: |
        docker system prune -a -f
        docker volume prune -f

    - name: Pull Docker Images, Package and Split Big Files
      run: |
        images="${{ github.event.inputs.docker_images }}"
        IFS=',' read -r -a image_array <<< "$images"
        
        # 创建用于存放最终物理文件的临时目录
        mkdir -p ./final_artifacts
        
        for image in "${image_array[@]}"; do
          echo "Processing image: ${image}"
          docker pull "${image}" --platform "linux/amd64"
          
          image_name="${image//\//_}"
          image_name="${image_name//:/_}"
          
          temp_tar="${image_name}-amd64.tar"
          target_xz="${image_name}-amd64.xz"
          
          # 物理打包与极限压缩
          docker save "${image}" -o "${temp_tar}"
          xz -v -T0 -8 "${temp_tar}"
          mv "${temp_tar}.xz" "${target_xz}"
          
          file_size=$(stat -c%s "${target_xz}")
          max_size=1073741824 # 判断线：1GB
          
          if [ "$file_size" -gt "$max_size" ]; then
            echo "File ${target_xz} is larger than 1GB. Splitting..."
            # 进行物理分片，前缀保留镜像名
            split -b 900M -d "${target_xz}" "./final_artifacts/${image_name}-amd64_"
            rm "${target_xz}"
            
            # 将每个分片强制改名为标准的 .xz 结尾，绝不留任何 .part
            for part in ./final_artifacts/${image_name}-amd64_*; do
              mv "$part" "${part}.xz"
            done
          else
            echo "File ${target_xz} is within limits. Moving to final dir."
            mv "${target_xz}" ./final_artifacts/
          fi
          docker rmi "${image}" -f
        done

    # 扫描生成的物理文件，构建成不含 ZIP 包装的跨 Job 上传矩阵
    - name: Generate Matrix List and Stage Files
      id: set-matrix
      run: |
        cd ./final_artifacts
        # 生成 JSON 数组：["file1.xz", "file2.xz", ...]
        FILES_JSON=$(ls | jq -R -s -c 'split("\n") | del(.[] | select(. == ""))')
        echo "files_json=${FILES_JSON}" >> $GITHUB_OUTPUT
        echo "Generated list: ${FILES_JSON}"
        
        # 为了不通过 Actions 缓存（缓存会强制压成 ZIP）跨作业传递文件，
        # 我们巧妙地利用临时大文件共享目录转存物理文件
        cd ..
        mkdir -p /tmp/shared_artifacts
        mv ./final_artifacts/* /tmp/shared_artifacts/

    # 利用标准的 Actions 打包上传，此时它只负责在 Job 间无损流式对接
    - name: Inter-Job Internal Transfer
      uses: actions/upload-artifact@v7
      with:
        name: internal_raw_transfer_bridge
        path: /tmp/shared_artifacts/
        retention-days: 1

  # ==========================================
  # 阶段二：并发矩阵，【每次严格仅上传 1 个物理文件】，彻底消灭 .zip
  # ==========================================
  upload_unzipped_pieces:
    needs: pull_and_package
    runs-on: ubuntu-22.04
    strategy:
      # 动态阵列：有几个 .xz 文件，GitHub 就会自动并发启动几个独立的上传通道
      matrix:
        filename: ${{ fromJson(needs.pull_and_package.outputs.files_json) }}
    steps:
    # 从内部桥梁下载阶段一产出的所有原始文件
    - name: Download Raw Pieces
      uses: actions/download-artifact@v7
      with:
        name: internal_raw_transfer_bridge
        path: ./incoming_stage

    # 核心点：调用 v7 且声明 archive: false。
    # 此时由于 path 里面【只包含单文件】，完美满足 v7 的不打包限制！
    - name: Upload Single Native XZ File (No ZIP Allowed)
      uses: actions/upload-artifact@v7
      with:
        # 制品展示名称（去除多余点号避免干扰，转为下划线）
        name: ${{ github.event.inputs.artifact_name }}_${{ replace(matrix.filename, '.', '_') }}
        # 严格指定单个物理文件的绝对路径
        path: ./incoming_stage/${{ matrix.filename }}
        archive: false
        retention-days: 1
