name: x86-64 Pull and Save Docker Image
on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称 多个用英文逗号分开'
        required: true
        default: 'alpine:latest,busybox:stable-glibc'
      artifact_name:
        description: '请填写制品包名称'
        required: true
        default: 'artifact'

jobs:
  # ==========================================
  # 阶段一：下载、打包、切片，并生成切片文件列表
  # ==========================================
  pull_and_package:
    runs-on: ubuntu-22.04
    outputs:
      files_json: ${{ steps.set-matrix.outputs.files_json }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clean up Docker to free space
      run: |
        docker system prune -a -f
        docker volume prune -f

    - name: Pull Docker Images, Package and Split Big Files
      run: |
        images="${{ github.event.inputs.docker_images }}"
        IFS=',' read -r -a image_array <<< "$images"
        
        # 创建统一暂存区
        mkdir -p ./stage_dir
        
        for image in "${image_array[@]}"; do
          echo "Processing image: ${image}"
          docker pull "${image}" --platform "linux/amd64"
          
          image_name="${image//\//_}"
          image_name="${image_name//:/_}"
          target_tar="${image_name}-amd64.tar"
          target_xz="${target_tar}.xz"
          
          docker save "${image}" -o "${target_tar}"
          xz -v -T0 -8 "${target_tar}"
          
          file_size=$(stat -c%s "${target_xz}")
          max_size=1073741824 # 1GB
          
          if [ "$file_size" -gt "$max_size" ]; then
            echo "File ${target_xz} is larger than 1GB. Splitting..."
            # 关键修改：切片前缀改为 target_xz 并去除多余下划线，不在此处加额外后缀
            split -b 900M -d "${target_xz}" "./stage_dir/${target_xz}_"
            rm "${target_xz}"
            
            # 关键修改：遍历刚刚生成的切片文件（如 xxx.xz_00），将其重命名为以 .part.xz 结尾
            # 这样既保留了数字顺序，又满足了 .xz 结尾的要求
            for part in ./stage_dir/${target_xz}_*; do
              mv "$part" "${part}.xz"
            done
          else
            echo "File ${target_xz} is within limits. Moving to stage dir."
            mv "${target_xz}" ./stage_dir/
          fi
          docker rmi "${image}" -f
        done

    # 扫描暂存区，生成 JSON 矩阵并输出
    - name: Generate Matrix and Cache Files
      id: set-matrix
      run: |
        cd ./stage_dir
        # 获取所有生成的文件名，并转换为 JSON 数组格式
        FILES_JSON=$(ls | jq -R -s -c 'split("\n") | del(.[] | select(. == ""))')
        echo "files_json=${FILES_JSON}" >> $GITHUB_OUTPUT
        echo "Generated matrix: ${FILES_JSON}"
        
        cd ..
        mv ./stage_dir/* ./

    # 临时将本地切片文件存入 Cache
    - name: Cache pieces for upload
      uses: actions/cache/save@v4
      with:
        path: ./*-amd64.tar.xz*
        key: docker-pieces-${{ github.run_id }}-${{ github.run_attempt }}

  # ==========================================
  # 阶段二：使用 Matrix 矩阵，每个文件独立上传
  # ==========================================
  upload_individual_artifacts:
    needs: pull_and_package
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        filename: ${{ fromJson(needs.pull_and_package.outputs.files_json) }}
    steps:
    # 恢复上一个 Job 存入的切片文件
    - name: Restore cached pieces
      uses: actions/cache/restore@v4
      with:
        path: ./*-amd64.tar.xz*
        key: docker-pieces-${{ github.run_id }}-${{ github.run_attempt }}
        fail-on-cache-miss: true

    # 单独上传当前矩阵对应的这一个文件
    - name: Upload Single Piece as Distinct Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.artifact_name }}_${{ matrix.filename }}
        path: ${{ matrix.filename }}
        retention-days: 1
