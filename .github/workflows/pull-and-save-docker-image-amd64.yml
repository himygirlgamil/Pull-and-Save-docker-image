name: x86-64 Pull and Save Docker Image
on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称 多个用英文逗号分开'
        required: true
        default: 'alpine:latest,busybox:stable-glibc'
      artifact_name:
        description: '请填写制品包名称'
        required: true
        default: 'artifact'

jobs:
  pull_and_package:
    runs-on: ubuntu-22.04
    outputs:
      public_artifacts: true

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clean up Docker to free space
      run: |
        docker system prune -a -f
        docker volume prune -f

    - name: Pull Docker Images, Package and Split Big Files
      run: |
        images="${{ github.event.inputs.docker_images }}"
        IFS=',' read -r -a image_array <<< "$images"
        
        # 创建一个专门存放最终导出文件的目录，避免污染工作区根目录
        mkdir -p ./artifacts_export
        
        for image in "${image_array[@]}"; do
          echo "Processing image: ${image}"
          docker pull "${image}" --platform "linux/amd64"
          
          # 转换名称格式
          image_name="${image//\//_}"
          image_name="${image_name//:/_}"
          target_tar="${image_name}-amd64.tar"
          target_xz="${target_tar}.xz"
          
          # 导出并极限压缩
          docker save "${image}" -o "${target_tar}"
          xz -v -T0 -8 "${target_tar}"
          
          # 获取压缩后文件的大小（字节）
          file_size=$(stat -c%s "${target_xz}")
          # 1GB = 1073741824 字节
          max_size=1073741824
          
          if [ "$file_size" -gt "$max_size" ]; then
            echo "File ${target_xz} is larger than 1GB. Splitting..."
            # 将大文件分割为每块 900M 的分片，后缀形如 .part_aa, .part_ab
            split -b 900M -d --additional-suffix=".part" "${target_xz}" "./artifacts_export/${target_xz}_"
            rm "${target_xz}"  # 删除原超大文件，避免重复上传
          else
            echo "File ${target_xz} is within limits. Moving to export dir."
            mv "${target_xz}" ./artifacts_export/
          fi
          
          # 清理本地 Docker 镜像释放空间，防止多镜像并发导致磁盘爆满
          docker rmi "${image}" -f
        done

    # 统一上传所有构建出的制品
    # 如果文件没超 1G，上传的就是形如：xxx.tar.xz
    # 如果文件超过 1G，上传的就是形如：xxx.tar.xz_00.part, xxx.tar.xz_01.part
    - name: Upload artifact pieces
      uses: actions/upload-artifact@v4
      with:
        name: ${{ github.event.inputs.artifact_name }}
        path: ./artifacts_export/*
        retention-days: 1
