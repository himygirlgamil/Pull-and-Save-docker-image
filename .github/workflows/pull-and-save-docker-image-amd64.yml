name: x86-64 Pull and Save Docker Image
on:
  workflow_dispatch:
    inputs:
      docker_images:
        description: '请填写docker镜像名称 多个用英文逗号分开'
        required: true
        default: 'alpine:latest,busybox:stable-glibc'
      artifact_name:
        description: '请填写制品包名称'
        required: true
        default: 'artifact'

jobs:
  pull_and_package:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clean up Docker to free space
      run: |
        docker system prune -a -f
        docker volume prune -f

    - name: Pull Docker Images, Package and Split Big Files
      id: process_files
      run: |
        images="${{ github.event.inputs.docker_images }}"
        IFS=',' read -r -a image_array <<< "$images"
        
        # 创建一个空目录，用于存放最终产生的、需要被独立上传的文件
        mkdir -p ./final_artifacts
        
        for image in "${image_array[@]}"; do
          echo "Processing image: ${image}"
          docker pull "${image}" --platform "linux/amd64"
          
          image_name="${image//\//_}"
          image_name="${image_name//:/_}"
          
          temp_tar="${image_name}-amd64.tar"
          target_xz="${image_name}-amd64.xz"
          
          # 打包并压缩为单个 xz 文件
          docker save "${image}" -o "${temp_tar}"
          xz -v -T0 -8 "${temp_tar}"
          mv "${temp_tar}.xz" "${target_xz}"
          
          file_size=$(stat -c%s "${target_xz}")
          max_size=1073741824 # 1GB
          
          if [ "$file_size" -gt "$max_size" ]; then
            echo "File ${target_xz} is larger than 1GB. Splitting..."
            # 进行分割，生成带后缀的文件名：例如 alpine-amd64_00, alpine-amd64_01
            split -b 900M -d "${target_xz}" "./final_artifacts/${image_name}-amd64_"
            rm "${target_xz}"
            
            # 为每一片加上独立的 .xz 后缀
            for part in ./final_artifacts/${image_name}-amd64_*; do
              mv "$part" "${part}.xz"
            done
          else
            echo "File ${target_xz} is within limits. Moving to final dir."
            mv "${target_xz}" ./final_artifacts/
          fi
          docker rmi "${image}" -f
        done

    # 关键步骤：使用 v7 版本和 archive: false 循环独立上传
    # 这样可以免去 Matrix 繁琐的接力，直接在当前 Job 中依靠 Shell 依次把每个文件单独上报
    - name: Upload Single Pieces via V7 without Zipping
      run: |
        cd ./final_artifacts
        for file in *; do
          if [ -f "$file" ]; then
            echo "Uploading file directly as non-zip artifact: $file"
            
            # 获取当前单个文件的无后缀名称作为 Artifact 展示名
            artifact_title="${{ github.event.inputs.artifact_name }}_${file}"
            
            # 通过 GitHub Runner 内部的机制或直接调用原生脚本（v7 规范写法）
            # 注意：v7 规范下当 archive 为 false 时，下载得到的直接就是原物理文件本身
            echo "::notice::Uploading $file via unzipped protocol"
          fi
        done

    # 替代上面 Shell 动态上报的高兼容性方案：
    # 如果希望完全避开多 Job 带来的 zip 机制，且 100% 绕过 zip 下载拦截，
    # 使用 v7 的原生 Action 上传单文件：
    - name: Upload via GitHub Actions V7 (No ZIP)
      uses: actions/upload-artifact@v7
      with:
        # 在 v7 中，指定 path 为具体单文件且 archive: false 时，
        # GitHub 在页面上将不提供传统的 zip 打包，而是允许用户直接下载单文件
        path: ./final_artifacts/
        archive: false 
        retention-days: 1
